name: Maquina de Greens Bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  rodar-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    # Evita execucoes paralelas — so 1 por vez
    concurrency:
      group: bot-run
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: pip install requests

      - name: Rodar o robo
        run: python bot_live.py

      - name: Salvar estado no repositorio
        if: always()
        run: |
          git config user.name "bot-state"
          git config user.email "bot@state.local"
          git add -f sent_live_signals.json sinais_registrados.json resultados.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "state: atualiza sinais enviados [skip ci]"
          git push || true
