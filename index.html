<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PAINEL DE ROBÔS</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-title" content="PAINEL DE ROBÔS">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:linear-gradient(180deg,#1a1a2e 0%,#d48821 100%);
  background-attachment:fixed; color:#fff; min-height:100vh;
  display:flex; align-items:center; justify-content:center;
}
.login-box {
  background:rgba(26,26,46,0.95);
  padding:40px 30px;
  border-radius:16px;
  width:90%;
  max-width:380px;
  text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
.login-box img {
  width:80px; height:80px;
  border-radius:50%;
  margin-bottom:16px;
  border:3px solid #d48821;
}
.login-box h1 {
  font-size:20px; margin-bottom:8px;
  color:#d48821;
}
.login-box p {
  font-size:13px; color:#8892b0; margin-bottom:24px;
}
.login-box input {
  width:100%; padding:14px 16px;
  border:2px solid #2a2a4a;
  border-radius:10px;
  background:#0d1117;
  color:#fff;
  font-size:16px;
  outline:none;
  transition:border-color .3s;
  margin-bottom:12px;
}
.login-box input:focus {
  border-color:#d48821;
}
.login-box button {
  width:100%; padding:14px;
  background:#d48821;
  color:#1a1a2e;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:opacity .3s;
  margin-top:4px;
}
.login-box button:hover { opacity:.9; }
.login-box button:active { opacity:.7; }
.erro {
  color:#ff4444;
  font-size:13px;
  margin-top:12px;
  display:none;
}
.erro.mostrar { display:block; }
</style>
</head>
<body>
<div class="login-box">
  <img src="icon-192.png" alt="PAINEL">
  <h1>🔐 PAINEL DE ROBÔS</h1>
  <p>Acesse com usuário e senha</p>
  <input type="text" id="usuario" placeholder="Usuário" autocomplete="off" enterkeyhint="next">
  <input type="password" id="senha" placeholder="Senha" autocomplete="off" enterkeyhint="go">
  <button onclick="entrar()">ENTRAR</button>
  <div class="erro" id="erro">🔒 Usuário ou senha incorretos</div>
</div>

<script>
(function(){
  if(sessionStorage.getItem('logado') === 'true'){
    window.location.href = 'painel.html';
    return;
  }
  const userInput = document.getElementById('usuario');
  const passInput = document.getElementById('senha');
  userInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter') { e.preventDefault(); passInput.focus(); }
  });
  passInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter') entrar();
  });
  userInput.focus();
})();

function entrar(){
  const usuario = document.getElementById('usuario').value;
  const senha = document.getElementById('senha').value;
  const userOk = btoa(usuario) === 'bWFxdWluYWRlZ3JlZW5zdmlw';
  const passOk = btoa(senha) === 'QEJpYW5vMzIx';
  if(userOk && passOk){
    sessionStorage.setItem('logado', 'true');
    window.location.href = 'painel.html';
  } else {
    document.getElementById('erro').classList.add('mostrar');
    document.getElementById('usuario').value = '';
    document.getElementById('senha').value = '';
    document.getElementById('usuario').focus();
  }
}
</script>
</body>
</html>
